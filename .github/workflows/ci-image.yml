name: CI Image

on:
  push:
    branches: [main]
    paths:
      - .github/docker/ci/Dockerfile
      - .github/workflows/ci-image.yml
  schedule:
    # First of each month, 03:00 UTC. Picks up new patch releases of
    # the base image / apt packages without manual prodding.
    - cron: '0 3 1 * *'
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .github/docker/ci
          push: true
          tags: ghcr.io/${{ github.repository }}/ci:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
